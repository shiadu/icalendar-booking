<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iCalendar Booking</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f6f7fb; margin:0; }
      .wrap { max-width:780px; margin:40px auto; padding:20px; }
      .card { background:white; border-radius:14px; padding:20px; box-shadow:0 8px 24px rgba(0,0,0,.08); margin-bottom:16px; }
      h1 { margin:0 0 6px; }
      .muted { color:#637085; }
      label { display:block; margin-top:12px; font-weight:600; }
      select, input, button { width:100%; padding:10px; border-radius:10px; border:1px solid #d6dbe3; margin-top:8px; }
      button { background:#111827; color:white; border:none; cursor:pointer; }
      button:hover { opacity:.95; }
      .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-top:12px; }
      .slot { border:1px solid #d6dbe3; background:white; padding:10px; border-radius:10px; cursor:pointer; }
      .slot.active { border-color:#111827; background:#111827; color:white; }
      .ok { color:#0f9d58; font-weight:600; }
      .err { color:#d93025; font-weight:600; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>iCalendar</h1>
        <div class="muted">Book a time (Tuesdays, 2:00 PM–6:00 PM ET)</div>
      </div>

      <div class="card">
        <label>Date (Tuesday only)</label>
        <input id="date" type="date" />

        <label>Duration</label>
        <select id="duration">
          <option>15</option><option>20</option><option selected>30</option><option>45</option><option>60</option>
        </select>

        <button id="load">Find available times</button>
        <div id="slots" class="grid"></div>
      </div>

      <div class="card">
        <label>Your name</label>
        <input id="name" placeholder="Jane Doe" />
        <label>Your email</label>
        <input id="email" type="email" placeholder="jane@email.com" />
        <label>Selected time</label>
        <input id="selected" disabled placeholder="Pick a slot above" />
        <button id="book">Book meeting</button>
        <p id="status"></p>
      </div>
    </div>

    <script>
      const slotsEl = document.getElementById('slots');
      const statusEl = document.getElementById('status');
      const selectedEl = document.getElementById('selected');
      let selectedIso = null;

      function setStatus(msg, ok=true){
        statusEl.className = ok ? 'ok' : 'err';
        statusEl.textContent = msg;
      }

      document.getElementById('load').onclick = async () => {
        const date = document.getElementById('date').value;
        const duration = document.getElementById('duration').value;
        if(!date) return setStatus('Pick a date first.', false);
        setStatus('Loading...', true);
        slotsEl.innerHTML = '';
        selectedIso = null;
        selectedEl.value = '';

        const res = await fetch(`/api/availability?date=${date}&duration=${duration}`);
        const data = await res.json();
        if(!res.ok) return setStatus(data.error || 'Could not load slots.', false);
        if(!data.slots.length) return setStatus('No slots available for that date.', false);

        data.slots.forEach(s => {
          const b = document.createElement('button');
          b.className = 'slot';
          b.type='button';
          b.textContent = s.label;
          b.onclick = () => {
            [...document.querySelectorAll('.slot')].forEach(x=>x.classList.remove('active'));
            b.classList.add('active');
            selectedIso = s.start;
            selectedEl.value = s.label;
          };
          slotsEl.appendChild(b);
        });
        setStatus('Select a time slot.');
      };

      document.getElementById('book').onclick = async () => {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const duration = Number(document.getElementById('duration').value);
        if(!name || !email || !selectedIso) return setStatus('Enter name/email and select a slot.', false);

        setStatus('Booking...', true);
        const res = await fetch('/api/book', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ name, email, start: selectedIso, duration })
        });
        const data = await res.json();
        if(!res.ok) return setStatus(data.error || 'Booking failed.', false);
        setStatus('Booked! Calendar invite sent.');
      };
    </script>
  </body>
</html>
