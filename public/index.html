<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iCalendar Booking</title>
    <style>
      :root{
        /* Palette aligned with xiaotongdu.com */
        --bg:#F6F6F6;
        --card:#FFFFFF;
        --line:#E2E2E2;
        --text:#3c3c3c;
        --muted:#686868;
        --primary:#3c3c3c;
        --accent:#68c5d3;
        --ok:#449d44;
        --err:#C72A31;
      }
      *{box-sizing:border-box}
      body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);margin:0}
      .wrap{max-width:1040px;margin:28px auto;padding:0 16px}
      .hero{background:linear-gradient(120deg,#3c3c3c,#5755A1);color:#fff;padding:28px;border-radius:16px;margin-bottom:16px}
      .hero h1{margin:0 0 8px;font-size:32px}
      .hero p{margin:0;color:#F1F1F1}
      .badge{display:inline-block;margin-top:12px;padding:8px 10px;border:1px solid rgba(255,255,255,.35);border-radius:999px;font-size:12px;background:rgba(104,197,211,.22)}

      .grid{display:grid;grid-template-columns:1.2fr 1fr;gap:14px}
      .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
      .card h2{margin:0 0 10px;font-size:18px}
      .muted{color:var(--muted)}

      .event-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
      .event{border:1px solid var(--line);border-radius:10px;padding:12px;cursor:pointer;background:#fff}
      .event.active{border-color:var(--primary);outline:2px solid rgba(15,23,42,.08)}
      .event .t{font-weight:700}
      .event .d{font-size:13px;color:var(--muted)}
      .event .m{font-size:12px;color:var(--accent);margin-top:6px}

      label{display:block;margin:10px 0 6px;font-weight:600;font-size:14px}
      input,select,button{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #cbd5e1;font:inherit}
      button{background:var(--primary);color:#fff;border:none;cursor:pointer}
      button:hover{opacity:.95}
      button.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}
      button:focus,input:focus,select:focus{outline:2px solid rgba(104,197,211,.5);outline-offset:1px}

      .dates{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-top:8px}
      .date-btn{border:1px solid var(--line);padding:10px;border-radius:10px;background:#fff;cursor:pointer;text-align:left}
      .date-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
      .date-btn.disabled{background:#f1f1f1;color:#a5a5a5;border-color:#e2e2e2;cursor:not-allowed;opacity:.9}

      .slots{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-top:8px}
      .slot{border:1px solid var(--line);padding:10px;border-radius:10px;background:#fff;cursor:pointer;text-align:left}
      .slot.active{background:var(--primary);color:#fff;border-color:var(--primary)}

      .status{margin-top:10px;font-weight:600}
      .status.ok{color:var(--ok)}
      .status.err{color:var(--err)}

      .kv{display:grid;grid-template-columns:130px 1fr;gap:8px;font-size:14px;margin:8px 0}
      .pill{display:inline-block;background:#eef9fb;border:1px solid #B4D8E7;color:#1f7e9a;padding:4px 8px;border-radius:999px;font-size:12px;margin-right:6px}

      .hidden{display:none}

      @media (max-width: 920px){
        .grid{grid-template-columns:1fr}
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <h1 id="brandTitle">Book a meeting</h1>
        <p id="heroSub">Pick a time that works for both of us.</p>
        <span class="badge" id="rulesBadge">Loading booking rules...</span>
      </div>

      <div class="grid">
        <div class="card">
          <h2>1) Choose meeting type</h2>
          <div id="eventTypes" class="event-grid"></div>

          <h2 style="margin-top:16px">2) Pick date and time</h2>
          <label>Available dates</label>
          <div id="dateChoices" class="dates"></div>
          <input id="date" type="hidden" />

          <label>Duration</label>
          <select id="duration"></select>

          <button id="load">Find available times</button>
          <div id="slots" class="slots"></div>
          <div id="slotStatus" class="status"></div>
        </div>

        <div class="card">
          <h2>3) Your details</h2>
          <label>Your name</label>
          <input id="name" placeholder="Jane Doe" />

          <label>Your email</label>
          <input id="email" type="email" placeholder="jane@email.com" />

          <label>Selected time</label>
          <input id="selected" disabled placeholder="Pick a slot first" />

          <div class="kv"><div>Meeting type</div><div id="summaryType" class="muted">—</div></div>
          <div class="kv"><div>Duration</div><div id="summaryDuration" class="muted">—</div></div>

          <button id="book">Book meeting</button>
          <button id="openEvent" class="secondary hidden" type="button">Open calendar event</button>
          <div id="bookStatus" class="status"></div>

          <div style="margin-top:14px" class="muted">
            <span class="pill">Invite sent automatically</span>
            <span class="pill">Timezone-safe booking</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      const els = {
        brandTitle: document.getElementById('brandTitle'),
        heroSub: document.getElementById('heroSub'),
        rulesBadge: document.getElementById('rulesBadge'),
        eventTypes: document.getElementById('eventTypes'),
        date: document.getElementById('date'),
        dateChoices: document.getElementById('dateChoices'),
        duration: document.getElementById('duration'),
        load: document.getElementById('load'),
        slots: document.getElementById('slots'),
        slotStatus: document.getElementById('slotStatus'),
        name: document.getElementById('name'),
        email: document.getElementById('email'),
        selected: document.getElementById('selected'),
        summaryType: document.getElementById('summaryType'),
        summaryDuration: document.getElementById('summaryDuration'),
        book: document.getElementById('book'),
        bookStatus: document.getElementById('bookStatus'),
        openEvent: document.getElementById('openEvent')
      };

      let config = null;
      let selectedIso = null;
      let selectedLabel = '';
      let selectedEventType = null;
      const viewerTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Local Time';

      function setStatus(el, msg, ok=true){
        el.className = 'status ' + (ok ? 'ok' : 'err');
        el.textContent = msg;
      }

      function renderEventTypes(types){
        els.eventTypes.innerHTML = '';
        types.forEach((t, i) => {
          const div = document.createElement('button');
          div.type = 'button';
          div.className = 'event' + (i===0 ? ' active' : '');
          div.innerHTML = `<div class="t">${t.label}</div><div class="d">${t.description}</div><div class="m">${t.duration} min</div>`;
          div.onclick = () => {
            document.querySelectorAll('.event').forEach(x => x.classList.remove('active'));
            div.classList.add('active');
            selectedEventType = t;
            els.duration.value = String(t.duration);
            els.summaryType.textContent = t.label;
            els.summaryDuration.textContent = `${t.duration} minutes`;
          };
          els.eventTypes.appendChild(div);
        });

        if(types[0]){
          selectedEventType = types[0];
          els.summaryType.textContent = types[0].label;
          els.summaryDuration.textContent = `${types[0].duration} minutes`;
        }
      }

      function toLocalYMD(d){
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,'0');
        const day = String(d.getDate()).padStart(2,'0');
        return `${y}-${m}-${day}`;
      }

      function renderAvailableDates(bookingDay){
        els.dateChoices.innerHTML = '';
        const today = new Date();

        let firstAvailableYMD = '';

        // Show next 21 days: available day selectable, others greyed out
        for(let i=0; i<21; i++){
          const dt = new Date(today);
          dt.setDate(today.getDate()+i);
          const isAvailable = dt.getDay() === bookingDay;

          const btn = document.createElement('button');
          btn.type='button';
          btn.className='date-btn' + (isAvailable ? '' : ' disabled');

          const label = dt.toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'});
          btn.textContent = label;

          const ymd = toLocalYMD(dt);

          if (isAvailable && !firstAvailableYMD) {
            firstAvailableYMD = ymd;
            btn.classList.add('active');
          }

          btn.onclick = () => {
            if (!isAvailable) return;
            document.querySelectorAll('.date-btn').forEach(x=>x.classList.remove('active'));
            btn.classList.add('active');
            els.date.value = ymd;
            selectedIso = null;
            els.selected.value = '';
            els.slots.innerHTML = '';
            setStatus(els.slotStatus, 'Date selected. Click “Find available times”.', true);
          };

          els.dateChoices.appendChild(btn);
        }

        els.date.value = firstAvailableYMD;
      }

      function renderDurations(durations){
        els.duration.innerHTML = '';
        durations.forEach(d => {
          const o = document.createElement('option');
          o.value = d;
          o.textContent = `${d} minutes`;
          els.duration.appendChild(o);
        });
      }

      async function loadConfig(){
        const res = await fetch('/api/config');
        config = await res.json();

        els.brandTitle.textContent = `Book with ${config.hostName || 'us'}`;
        els.heroSub.textContent = `${config.brandName || 'Booking'} • Your timezone: ${viewerTimeZone} • Host timezone: ${config.timezone}`;
        els.rulesBadge.textContent = `Notice: ${config.minNoticeHours}h · Buffer: ${config.bufferMinutes}m · Max/day: ${config.maxMeetingsPerDay}`;

        renderDurations(config.durations || [15,20,30,45,60]);
        renderEventTypes(config.eventTypes || []);
        renderAvailableDates(config.bookingDay ?? 2);

        // default duration follows selected event type
        if (selectedEventType) els.duration.value = String(selectedEventType.duration);
      }

      function formatForViewer(iso){
        const d = new Date(iso);
        return d.toLocaleString(undefined, {
          weekday: 'short', month: 'short', day: 'numeric',
          hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
        });
      }

      els.load.onclick = async () => {
        const date = els.date.value;
        const duration = Number(els.duration.value || 30);

        if(!date) return setStatus(els.slotStatus, 'Pick a date first.', false);

        selectedIso = null;
        selectedLabel = '';
        els.selected.value = '';
        els.openEvent.classList.add('hidden');
        els.slots.innerHTML = '';
        setStatus(els.slotStatus, 'Loading availability...', true);

        const res = await fetch(`/api/availability?date=${encodeURIComponent(date)}&duration=${duration}`);
        const data = await res.json();

        if(!res.ok) return setStatus(els.slotStatus, data.error || 'Could not load slots.', false);
        if(!data.slots.length) return setStatus(els.slotStatus, 'No slots available for that date.', false);

        data.slots.forEach(s => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'slot';
          const viewerLabel = formatForViewer(s.start);
          b.innerHTML = `<div>${viewerLabel}</div><div class="muted" style="font-size:12px">Host time: ${s.hostLabel}</div>`;
          b.onclick = () => {
            document.querySelectorAll('.slot').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            selectedIso = s.start;
            selectedLabel = viewerLabel;
            els.selected.value = viewerLabel;
          };
          els.slots.appendChild(b);
        });

        setStatus(els.slotStatus, 'Select a time slot.', true);
      };

      els.book.onclick = async () => {
        const name = els.name.value.trim();
        const email = els.email.value.trim();
        const duration = Number(els.duration.value || 30);

        if(!name || !email || !selectedIso){
          return setStatus(els.bookStatus, 'Enter name/email and select a time slot.', false);
        }

        setStatus(els.bookStatus, 'Booking your meeting...', true);

        const res = await fetch('/api/book', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name,
            email,
            start: selectedIso,
            duration,
            eventTypeLabel: selectedEventType ? selectedEventType.label : 'Meeting'
          })
        });

        const data = await res.json();
        if(!res.ok) return setStatus(els.bookStatus, data.error || 'Booking failed.', false);

        setStatus(els.bookStatus, `Booked: ${selectedLabel}. Invite sent to ${email}.`, true);

        if (data.htmlLink) {
          els.openEvent.classList.remove('hidden');
          els.openEvent.onclick = () => window.open(data.htmlLink, '_blank');
        }
      };

      loadConfig().catch(() => {
        setStatus(els.slotStatus, 'Could not load app config. Refresh and try again.', false);
      });
    </script>
  </body>
</html>
