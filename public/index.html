<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book with Shia Du</title>
    <style>
      :root{
        --bg:#F6F6F6; --card:#FFFFFF; --line:#E2E2E2; --text:#3c3c3c; --muted:#686868;
        --primary:#3c3c3c; --accent:#68c5d3; --ok:#449d44; --err:#C72A31;
      }
      *{box-sizing:border-box}
      body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);margin:0}
      .wrap{max-width:1120px;margin:26px auto;padding:0 16px}
      .hero{background:linear-gradient(120deg,#3c3c3c,#5755A1);color:#fff;padding:24px;border-radius:16px;margin-bottom:14px}
      .hero h1{margin:0 0 6px;font-size:32px}
      .hero p{margin:0;color:#f1f1f1}

      .event-grid{display:flex;gap:12px;flex-wrap:nowrap;width:100%;margin-bottom:16px}
      .event{flex:1 1 0;min-width:0;border:1px solid var(--line);border-radius:12px;padding:14px;background:#fff;cursor:pointer;text-align:left;min-height:86px}
      .event.active{border-color:var(--primary);outline:2px solid rgba(15,23,42,.08)}
      .event .t{font-weight:700;font-size:16px;line-height:1.25}
      .event .m{font-size:13px;color:var(--accent);margin-top:6px}

      .shell{display:grid;grid-template-columns:1.3fr .9fr;gap:14px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px}
      .left,.right{background:#fff}
      .section-title{font-size:20px;font-weight:700;margin:0 0 12px}
      .muted{color:var(--muted)}

      .calendar{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}
      .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
      .cal-head h4{margin:0;font-size:16px}
      .cal-nav{display:flex;gap:6px}
      .cal-nav button{width:auto;padding:6px 10px;border-radius:8px;background:#fff;color:var(--text);border:1px solid var(--line);cursor:pointer}
      .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
      .cal-dow{font-size:11px;color:var(--muted);text-align:center;padding:4px 0}
      .cal-day{padding:8px 0;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);text-align:center;cursor:pointer;font-size:13px}
      .cal-day.disabled{background:#f1f1f1;color:#a5a5a5;border-color:#e2e2e2;cursor:not-allowed}
      .cal-day.active{background:var(--accent);color:#fff;border-color:var(--accent)}

      .tz-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:13px}
      .tz-select{padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:#fff;max-width:280px}
      .date-title{font-size:18px;font-weight:700;margin:2px 0 10px}
      .slots{display:flex;flex-direction:column;gap:8px}
      .slot-row{display:block}
      .slot{width:100%;border:1px solid var(--line);padding:10px;border-radius:10px;background:#fff;cursor:pointer;text-align:center}
      .slot.active{background:var(--primary);color:#fff;border-color:var(--primary)}

      label{display:block;margin:10px 0 6px;font-weight:600;font-size:14px}
      input,button{font:inherit}
      .field{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:10px}
      .book-btn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-weight:600;cursor:pointer}
      .book-btn[disabled]{opacity:.55;cursor:not-allowed}
      .status{margin-top:10px;font-weight:600}
      .ok{color:var(--ok)} .err{color:var(--err)}

      @media (max-width: 960px){
        .shell{grid-template-columns:1fr}
        .event-grid{flex-wrap:wrap}
        .event{flex:1 1 calc(50% - 10px)}
      }
      @media (max-width: 560px){
        .event{flex:1 1 100%}
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <h1 id="brandTitle">Book with Shia Du</h1>
        <p id="heroSub">Choose a time in your local timezone.</p>
      </div>

      <h3 class="section-title" style="margin:0 0 10px">Meeting type</h3>
      <div id="eventTypes" class="event-grid"></div>

      <div class="shell">
        <div class="left">
          <h2 class="section-title">Date</h2>
          <div class="calendar">
            <div class="cal-head">
              <h4 id="calTitle">Month YYYY</h4>
              <div class="cal-nav">
                <button id="calPrev" type="button">◀</button>
                <button id="calNext" type="button">▶</button>
              </div>
            </div>
            <div class="cal-grid" id="calDow"></div>
            <div class="cal-grid" id="calDays"></div>
            <div class="tz-row">
              <span class="muted">Your timezone</span>
              <select id="tzSelect" class="tz-select"></select>
            </div>
          </div>
        </div>

        <div class="right">
          <div id="pickedDate" class="date-title">Available times</div>
          <div id="slots" class="slots"></div>
          <div id="slotStatus" class="status"></div>

          <label>Your name</label>
          <input id="name" class="field" placeholder="Jane Doe" />
          <label>Your email</label>
          <input id="email" class="field" type="email" placeholder="jane@email.com" />

          <button id="book" class="book-btn" disabled>Schedule meeting</button>
          <button id="openEvent" class="book-btn" style="display:none;background:#fff;color:var(--text);border:1px solid var(--line)">Open calendar event</button>
          <div id="bookStatus" class="status"></div>
        </div>
      </div>

      <input id="date" type="hidden" />
      <input id="duration" type="hidden" />
      <button id="load" style="display:none"></button>
    </div>

    <script>
      const els = {
        brandTitle: document.getElementById('brandTitle'), heroSub: document.getElementById('heroSub'),
        eventTypes: document.getElementById('eventTypes'), calTitle: document.getElementById('calTitle'),
        calDow: document.getElementById('calDow'), calDays: document.getElementById('calDays'),
        calPrev: document.getElementById('calPrev'), calNext: document.getElementById('calNext'),
        tzSelect: document.getElementById('tzSelect'), pickedDate: document.getElementById('pickedDate'),
        date: document.getElementById('date'), duration: document.getElementById('duration'),
        slots: document.getElementById('slots'), slotStatus: document.getElementById('slotStatus'),
        name: document.getElementById('name'), email: document.getElementById('email'),
        book: document.getElementById('book'), bookStatus: document.getElementById('bookStatus'),
        openEvent: document.getElementById('openEvent'), load: document.getElementById('load')
      };

      let viewerTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
      let config = null, currentMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
      let activeBookingDays = [2], selectedEventType = null, selectedIso = null;

      function toLocalYMD(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
      function timezoneOptions(){
        const common = ['America/New_York','America/Chicago','America/Denver','America/Los_Angeles','Europe/London','Europe/Paris','Asia/Shanghai','Asia/Hong_Kong','Asia/Tokyo','UTC'];
        const all = (typeof Intl.supportedValuesOf === 'function') ? Intl.supportedValuesOf('timeZone') : common;
        return [...new Set([...common, ...all])];
      }
      function renderTimezonePicker(){
        const opts = timezoneOptions();
        els.tzSelect.innerHTML = opts.map(t=>`<option value="${t}">${t}</option>`).join('');
        els.tzSelect.value = opts.includes(viewerTimeZone) ? viewerTimeZone : 'UTC';
      }
      function validateEmail(email){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
      function setStatus(el,msg,ok=true){ el.className='status '+(ok?'ok':'err'); el.textContent=msg; }
      function updateBookEnabled(){ els.book.disabled = !(els.name.value.trim() && validateEmail(els.email.value.trim()) && selectedIso); }
      function formatRange(startIso,endIso){
        const opts = {hour:'numeric',minute:'2-digit',hour12:true};
        const start = new Date(startIso).toLocaleTimeString(undefined,opts).toLowerCase();
        const end = new Date(endIso).toLocaleTimeString(undefined,opts).toLowerCase();
        return `${start}-${end}`;
      }

      function renderEventTypes(types){
        const wanted = config?.defaultEventTypeId || 'standard';
        let defaultIdx = Math.max(0, types.findIndex(t => t.id === wanted));
        els.eventTypes.innerHTML='';
        types.forEach((t,i)=>{
          const b=document.createElement('button'); b.type='button'; b.className='event'+(i===defaultIdx?' active':'');
          b.innerHTML=`<div class='t'>${t.label}</div><div class='m'>${t.duration} min</div>`;
          b.onclick=()=>{
            document.querySelectorAll('.event').forEach(x=>x.classList.remove('active'));
            b.classList.add('active');
            selectedEventType=t; els.duration.value=String(t.duration); selectedIso=null;
            els.slots.innerHTML=''; updateBookEnabled();
            if(els.date.value) loadAvailability();
          };
          els.eventTypes.appendChild(b);
        });
        selectedEventType = types[defaultIdx] || null;
        if(selectedEventType) els.duration.value = String(selectedEventType.duration);
      }

      function renderCalendar(){
        const y=currentMonth.getFullYear(), m=currentMonth.getMonth();
        els.calTitle.textContent = currentMonth.toLocaleDateString(undefined,{month:'long',year:'numeric'});
        els.calDow.innerHTML = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class='cal-dow'>${d}</div>`).join('');

        const first=new Date(y,m,1), start=first.getDay(), daysInMonth=new Date(y,m+1,0).getDate();
        const today=new Date(), tomorrow=new Date(today.getFullYear(),today.getMonth(),today.getDate()+1);
        let html=''; for(let i=0;i<start;i++) html+='<div></div>';
        let firstSelectable='';

        for(let day=1; day<=daysInMonth; day++){
          const d=new Date(y,m,day), ymd=toLocalYMD(d);
          const okDay=activeBookingDays.includes(d.getDay()) && d>=tomorrow;
          const active=els.date.value===ymd;
          if(!els.date.value && okDay && !firstSelectable) firstSelectable=ymd;
          html += `<button type='button' class='cal-day ${okDay?'':'disabled'} ${active?'active':''}' data-date='${ymd}'>${day}</button>`;
        }
        els.calDays.innerHTML=html;
        if(!els.date.value && firstSelectable){ els.date.value=firstSelectable; return renderCalendar(); }

        els.calDays.querySelectorAll('.cal-day').forEach(btn=>{
          btn.onclick=()=>{
            if(btn.classList.contains('disabled')) return;
            els.date.value=btn.dataset.date;
            selectedIso=null; els.slots.innerHTML=''; updateBookEnabled();
            renderCalendar(); loadAvailability();
          };
        });

        if(els.date.value){
          const d = new Date(els.date.value+'T00:00:00');
          els.pickedDate.textContent = d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
        }
      }

      async function loadAvailability(){
        if(!els.date.value) return;
        const duration = Number((selectedEventType && selectedEventType.duration) || els.duration.value || 30);
        setStatus(els.slotStatus,'Loading availability...',true); els.slots.innerHTML='';
        const res = await fetch(`/api/availability?date=${encodeURIComponent(els.date.value)}&duration=${duration}&viewerTimezone=${encodeURIComponent(viewerTimeZone)}`);
        const data = await res.json();
        if(!res.ok){ return setStatus(els.slotStatus,data.error||'Could not load slots.',false); }
        if(!data.slots?.length){ return setStatus(els.slotStatus,'No times available on this date. Try another day.',false); }

        data.slots.forEach(s=>{
          const row = document.createElement('div'); row.className='slot-row';
          const btn = document.createElement('button'); btn.type='button'; btn.className='slot'; btn.textContent=formatRange(s.start,s.end);
          btn.onclick=()=>{
            document.querySelectorAll('.slot').forEach(x=>x.classList.remove('active'));
            btn.classList.add('active');
            selectedIso=s.start; updateBookEnabled();
            setStatus(els.slotStatus,'Time selected. Complete your details and click Schedule meeting.',true);
            els.name.focus();
          };
          row.append(btn);
          els.slots.appendChild(row);
        });
        setStatus(els.slotStatus,'Select a time slot.',true);
      }

      els.load.onclick = loadAvailability;
      els.name.addEventListener('input',updateBookEnabled);
      els.email.addEventListener('input',updateBookEnabled);
      els.calPrev.addEventListener('click',()=>{ currentMonth = new Date(currentMonth.getFullYear(),currentMonth.getMonth()-1,1); renderCalendar(); });
      els.calNext.addEventListener('click',()=>{ currentMonth = new Date(currentMonth.getFullYear(),currentMonth.getMonth()+1,1); renderCalendar(); });
      els.tzSelect.addEventListener('change',()=>{
        viewerTimeZone = els.tzSelect.value;
        selectedIso = null;
        els.slots.innerHTML = '';
        if (els.date.value) loadAvailability();
      });

      els.book.onclick = async ()=>{
        const name=els.name.value.trim(), email=els.email.value.trim();
        const duration=Number((selectedEventType && selectedEventType.duration)||els.duration.value||30);
        if(!name || !validateEmail(email) || !selectedIso){ return setStatus(els.bookStatus,'Please add your name, valid email, and select a time.',false); }
        setStatus(els.bookStatus,'Booking...',true); els.book.disabled=true;

        const res = await fetch('/api/book',{
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ name,email,start:selectedIso,duration,eventTypeLabel:selectedEventType?.label||'Meeting',viewerTimezone })
        });
        const data = await res.json();
        if(!res.ok){ updateBookEnabled(); return setStatus(els.bookStatus,data.error||'Booking failed.',false); }
        setStatus(els.bookStatus,'You’re booked! Check your email for the calendar invite.',true);
        if(data.htmlLink){ els.openEvent.style.display='block'; els.openEvent.onclick=()=>window.open(data.htmlLink,'_blank'); }
      };

      async function init(){
        const res=await fetch('/api/config'); config=await res.json();
        els.brandTitle.textContent=`Book with ${config.hostName || 'Shia Du'}`;
        els.heroSub.textContent=`Host hours: 1:00–6:00 PM ET • Times shown in your selected timezone.`;
        renderTimezonePicker();

        activeBookingDays = config.bookingDays || [2,3,4];

        renderEventTypes(config.eventTypes||[]);
        renderCalendar();
        if(els.date.value) loadAvailability();
      }

      init().catch(()=>setStatus(els.slotStatus,'Could not initialize booking page.',false));
    </script>
  </body>
</html>
